name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    name: Test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest
        python-version:
          - '3.11'
          - '3.13'

    env:
      QT_QPA_PLATFORM: offscreen
      SOMEVAR_UI_REPO_TOKEN: ${{ secrets.SOMEVAR_UI_REPO_TOKEN }}

    steps:
      - name: Check out playground
        uses: actions/checkout@v4
        with:
          path: somevar-ui-playground

      - name: Check out SomeVar UI Kit
        if: ${{ env.SOMEVAR_UI_REPO_TOKEN == '' }}
        uses: actions/checkout@v4
        with:
          repository: quoterbox/somevar-ui
          path: somevar-ui

      - name: Check out SomeVar UI Kit with token
        if: ${{ env.SOMEVAR_UI_REPO_TOKEN != '' }}
        uses: actions/checkout@v4
        with:
          repository: quoterbox/somevar-ui
          path: somevar-ui
          token: ${{ env.SOMEVAR_UI_REPO_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: python -m pip install uv

      - name: Install Linux Qt runtime libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libdbus-1-3 \
            libfontconfig1 \
            libglib2.0-0 \
            libx11-6 \
            libx11-xcb1 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0

      - name: Build SomeVar UI Kit package
        working-directory: somevar-ui
        run: uv build

      - name: Sync dependencies
        working-directory: somevar-ui-playground
        run: uv sync --extra dev --find-links ../somevar-ui/dist

      - name: Run diagnostics
        working-directory: somevar-ui-playground
        run: uv run somevar-ui doctor

      - name: Run tests
        working-directory: somevar-ui-playground
        run: uv run python -m pytest
